<main class="fc-main">
    <section class="fc-profile-section">
        <div class="fc-header">
            <h1>Your Profile <mat-icon>person</mat-icon></h1>
        </div>
        
        <div class="fc-profile-form-container">
            <div class="fc-form-row">
                <mat-form-field appearance="outline" class="fc-profile-field">
                    <mat-label>Name</mat-label>
                    <input matInput placeholder="Enter your name">
                </mat-form-field>
                
                <mat-form-field appearance="outline" class="fc-profile-field">
                    <mat-label>Email</mat-label>
                    <input matInput placeholder="Enter your email">
                </mat-form-field>
            </div>
            
            <div class="fc-form-actions">
                <button mat-raised-button color="primary" class="fc-update-btn">Update</button>
            </div>
        </div>
    </section>
</main>
