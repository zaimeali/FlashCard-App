  <rect x="20" y="78" width="72" height="5" rx="2.5" fill="#9CA3AF"/>
  <rect x="20" y="92" width="56" height="5" rx="2.5" fill="#9CA3AF"/>
  <rect x="20" y="106" width="64" height="5" rx="2.5" fill="#9CA3AF"/>
  <!-- right tab accents -->
  <rect x="104" y="26" width="8" height="28" rx="4" fill="#4ADE80"/>
  <rect x="104" y="64" width="8" height="28" rx="4" fill="#34D399"/>
